services:
  ords:
    image: container-registry.oracle.com/database/ords:latest
    container_name: ords
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Connects to oracle-free on the shared oracle-net Docker network
      CONN_STRING: oracle-free:1521/ENTW
      # SYS/SYSTEM password for local Oracle (set in oracle docker-compose.yml)
      ORACLE_PWD: "OracleLocal26ai"
    volumes:
      - ords-config:/etc/ords/config
    networks:
      - oracle-net

volumes:
  ords-config:
    name: ords-config-local

networks:
  oracle-net:
    external: true
    name: oracle_default
