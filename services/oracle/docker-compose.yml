services:
  oracle-free:
    image: container-registry.oracle.com/database/free:latest-lite
    container_name: oracle-free
    restart: unless-stopped
    ports:
      - "1521:1521"
    environment:
      # SYS, SYSTEM and PDBADMIN password — change before any shared use
      # Avoid special characters (!, @, #) in password — shell escaping issues with Docker exec
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-OracleLocal26ai}
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

volumes:
  oracle_data:
    name: oracle-free-data
