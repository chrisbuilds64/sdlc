services:
  oracle-free:
    # Always pull latest Oracle Database Free (23ai+) — re-pin SHA after confirming stable
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-free
    restart: unless-stopped
    # Port bound to loopback only — not exposed to internet.
    # Access via SSH tunnel: ssh -L 1521:localhost:1521 deploy@SERVER_IP
    ports:
      - "127.0.0.1:1521:1521"
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - oracle-net
    healthcheck:
      test: ["CMD", "/opt/oracle/checkDBStatus.sh"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 300s

volumes:
  oracle_data:
    name: oracle-server-data

networks:
  oracle-net:
    name: oracle-net
