# Liquibase connection properties — local development
# For other environments, override via environment variables or separate .properties files
#
# Usage:
#   cd services/oracle
#   sql system/${ORACLE_PASSWORD}@localhost:1521/FREEPDB1
#   liquibase --defaults-file=liquibase.properties update

url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
username=system
# password: set via LIQUIBASE_COMMAND_PASSWORD env var or -Dpassword= flag
# Never commit passwords to this file

changeLogFile=controller.xml
logLevel=INFO
