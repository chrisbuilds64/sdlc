# =============================================================================
# MODULE 04: Oracle 26ai Free — Deploy + PDB Setup
# =============================================================================
#
# Deploys Oracle 26ai Free as a Docker container and sets up 3 pluggable
# databases for the SDLC environments: SDLC_DEV, SDLC_TEST, SDLC_PROD.
#
# What this playbook does:
#   1. Deploys Oracle container (no port exposure, stack-net only)
#   2. Waits for Oracle to become healthy (up to 5 min)
#   3. Drops FREEPDB1 (default PDB — frees up the 3-PDB limit of Free edition)
#   4. Creates SDLC_DEV, SDLC_TEST, SDLC_PROD (idempotent)
#   5. Opens all PDBs + saves state (survive restart)
#   6. Creates app user sdlc_app in each PDB (password from vars)
#   7. Runs Liquibase schema migrations per PDB (via Docker)
#
# Prerequisites:
#   - Module 01 (foundation.yml) must have run
#   - Module 02 (docker.yml) must have run
#   - Oracle runs on its own oracle-net (no Traefik dependency)
#
# Usage:
#   # Full setup (first time or re-deploy):
#   ansible-playbook -i inventory.local.yml oracle.yml \
#     -e oracle_password=YourSysPassword \
#     -e oracle_app_password=YourAppPassword
#
#   # Oracle container only (skip Liquibase):
#   ansible-playbook -i inventory.local.yml oracle.yml --tags oracle
#
#   # PDB setup only (container already running):
#   ansible-playbook -i inventory.local.yml oracle.yml --tags pdbs
#
#   # Liquibase only (re-run migrations):
#   ansible-playbook -i inventory.local.yml oracle.yml --tags liquibase
#
# Idempotency:
#   Safe to run multiple times. PDB creation checks existence before acting.
#   Liquibase tracks applied changesets — already-applied changes are skipped.
#
# Oracle Free Edition Limits:
#   2 CPUs, 2 GB RAM, 12 GB data, max 3 user PDBs.
#   FREEPDB1 (default) is dropped to free up the slot for our 3 named PDBs.
#
# =============================================================================

---
- name: "Module 04: Oracle 26ai Free"
  hosts: servers
  become: true
  gather_facts: true

  vars:
    server_user: "{{ deploy_user | default('deploy') }}"
    oracle_dir: /opt/oracle
    liquibase_dir: /opt/oracle/liquibase
    oracle_password: "{{ lookup('env', 'ORACLE_PASSWORD') | default('OracleServer26ai', true) }}"
    oracle_app_password: "{{ lookup('env', 'ORACLE_APP_PASSWORD') | default('SdlcApp2026', true) }}"
    pdb_names:
      - SDLC_DEV
      - SDLC_TEST
      - SDLC_PROD

  tasks:

    # =================================================================
    # PHASE 1: Directories + files
    # =================================================================

    - name: "Directories: create oracle stack directory"
      tags: [oracle, pdbs, liquibase]
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ server_user }}"
        group: "{{ server_user }}"
        mode: "0750"
      loop:
        - "{{ oracle_dir }}"
        - "{{ liquibase_dir }}"
        - "{{ liquibase_dir }}/releases/2026.04"

    - name: "Files: copy docker-compose.server.yml"
      tags: [oracle]
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../services/oracle/docker-compose.server.yml"
        dest: "{{ oracle_dir }}/docker-compose.yml"
        owner: "{{ server_user }}"
        group: "{{ server_user }}"
        mode: "0640"

    - name: "Files: write .env for Oracle container"
      tags: [oracle]
      ansible.builtin.copy:
        content: "ORACLE_PASSWORD={{ oracle_password }}\n"
        dest: "{{ oracle_dir }}/.env"
        owner: "{{ server_user }}"
        group: "{{ server_user }}"
        mode: "0600"

    - name: "Files: copy Liquibase changelog"
      tags: [liquibase]
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../services/oracle/liquibase/{{ item }}"
        dest: "{{ liquibase_dir }}/{{ item }}"
        owner: "{{ server_user }}"
        group: "{{ server_user }}"
        mode: "0640"
      loop:
        - controller.xml
        - releases/2026.04/001-initial-schema.sql

    # =================================================================
    # PHASE 2: Start Oracle container
    # =================================================================

    - name: "Oracle: start container"
      tags: [oracle]
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ oracle_dir }}"
      register: oracle_start
      changed_when: "'Started' in oracle_start.stderr or 'Created' in oracle_start.stderr"

    - name: "Oracle: wait for healthy (up to 5 minutes)"
      tags: [oracle, pdbs]
      ansible.builtin.command:
        cmd: docker inspect oracle-free --format "{{ '{{' }}.State.Health.Status{{ '}}' }}"
      register: oracle_health
      until: oracle_health.stdout.strip() == "healthy"
      retries: 30
      delay: 10
      changed_when: false

    # =================================================================
    # PHASE 3: PDB setup
    # =================================================================

    - name: "PDBs: drop FREEPDB1 (frees up the 3-PDB slot for named PDBs)"
      tags: [pdbs]
      ansible.builtin.shell: |
        docker exec oracle-free sqlplus -s "sys/{{ oracle_password }}@//localhost:1521/FREE as sysdba" <<'SQLEOF'
        WHENEVER SQLERROR CONTINUE
        DECLARE
          v_count NUMBER;
        BEGIN
          SELECT COUNT(*) INTO v_count FROM v$pdbs WHERE name = 'FREEPDB1';
          IF v_count > 0 THEN
            EXECUTE IMMEDIATE 'ALTER PLUGGABLE DATABASE FREEPDB1 CLOSE IMMEDIATE';
            EXECUTE IMMEDIATE 'DROP PLUGGABLE DATABASE FREEPDB1 INCLUDING DATAFILES';
          END IF;
        END;
        /
        EXIT;
        SQLEOF
      register: drop_freepdb1
      changed_when: "'PL/SQL procedure successfully completed' in drop_freepdb1.stdout"

    - name: "PDBs: create SDLC_DEV, SDLC_TEST, SDLC_PROD"
      tags: [pdbs]
      ansible.builtin.shell: |
        docker exec oracle-free sqlplus -s "sys/{{ oracle_password }}@//localhost:1521/FREE as sysdba" <<'SQLEOF'
        WHENEVER SQLERROR CONTINUE
        DECLARE
          v_count NUMBER;
        BEGIN
          SELECT COUNT(*) INTO v_count FROM v$pdbs WHERE name = '{{ item }}';
          IF v_count = 0 THEN
            EXECUTE IMMEDIATE q'[CREATE PLUGGABLE DATABASE {{ item }}
              ADMIN USER pdb_admin IDENTIFIED BY "{{ oracle_password }}"
              FILE_NAME_CONVERT = ('/opt/oracle/oradata/FREE/pdbseed/',
                                   '/opt/oracle/oradata/FREE/{{ item }}/')]';
          END IF;
        END;
        /
        EXIT;
        SQLEOF
      register: create_pdb
      changed_when: "'PL/SQL procedure successfully completed' in create_pdb.stdout"
      loop: "{{ pdb_names }}"

    - name: "PDBs: open all and save state (survives restart)"
      tags: [pdbs]
      ansible.builtin.shell: |
        docker exec oracle-free sqlplus -s "sys/{{ oracle_password }}@//localhost:1521/FREE as sysdba" <<'SQLEOF'
        WHENEVER SQLERROR CONTINUE
        ALTER PLUGGABLE DATABASE {{ item }} OPEN;
        ALTER PLUGGABLE DATABASE {{ item }} SAVE STATE;
        EXIT;
        SQLEOF
      loop: "{{ pdb_names }}"
      changed_when: false

    # =================================================================
    # PHASE 4: App user per PDB
    # =================================================================

    - name: "App user: create sdlc_app in each PDB"
      tags: [pdbs]
      ansible.builtin.shell: |
        docker exec oracle-free sqlplus -s "sys/{{ oracle_password }}@//localhost:1521/{{ item }} as sysdba" <<'SQLEOF'
        WHENEVER SQLERROR CONTINUE
        DECLARE
          v_count NUMBER;
        BEGIN
          SELECT COUNT(*) INTO v_count FROM dba_users WHERE username = 'SDLC_APP';
          IF v_count = 0 THEN
            EXECUTE IMMEDIATE 'CREATE USER sdlc_app IDENTIFIED BY "{{ oracle_app_password }}"';
            EXECUTE IMMEDIATE 'GRANT CREATE SESSION TO sdlc_app';
          END IF;
        END;
        /
        EXIT;
        SQLEOF
      loop: "{{ pdb_names }}"
      changed_when: false

    # =================================================================
    # PHASE 5: Liquibase schema migrations
    # =================================================================

    - name: "Liquibase: run migrations for {{ item }}"
      tags: [liquibase]
      ansible.builtin.command:
        cmd: >
          docker run --rm
          --network container:oracle-free
          -v {{ liquibase_dir }}:/liquibase/changelog
          liquibase/liquibase:latest
          --url="jdbc:oracle:thin:@//localhost:1521/{{ item }}"
          --username=system
          --password="{{ oracle_password }}"
          --changelog-file=controller.xml
          update
      loop: "{{ pdb_names }}"
      register: liquibase_result
      changed_when: "'successfully' in liquibase_result.stdout"

    # =================================================================
    # PHASE 6: App user grants (after schema exists)
    # =================================================================

    - name: "App user: grant DML on schema tables"
      tags: [pdbs]
      ansible.builtin.shell: |
        docker exec oracle-free sqlplus -s "sys/{{ oracle_password }}@//localhost:1521/{{ item }} as sysdba" <<'SQLEOF'
        WHENEVER SQLERROR CONTINUE
        GRANT SELECT, INSERT, UPDATE, DELETE ON system.sdlc_demo TO sdlc_app;
        EXIT;
        SQLEOF
      loop: "{{ pdb_names }}"
      changed_when: false

    # =================================================================
    # PHASE 7: Verify
    # =================================================================

    - name: "Verify: list all PDBs and status"
      tags: [oracle, pdbs, liquibase]
      ansible.builtin.shell: |
        docker exec oracle-free sqlplus -s "sys/{{ oracle_password }}@//localhost:1521/FREE as sysdba" <<'SQLEOF'
        SET PAGESIZE 20
        SELECT name, open_mode FROM v$pdbs ORDER BY name;
        EXIT;
        SQLEOF
      register: pdb_status
      changed_when: false

    - name: "Verify: summary"
      tags: [oracle, pdbs, liquibase]
      ansible.builtin.debug:
        msg: |
          === MODULE 04 COMPLETE ===

          Oracle 26ai Free: RUNNING (stack-net, no external port)
          PDBs:
          {{ pdb_status.stdout }}

          Connect (from within stack-net):
            DEV:  jdbc:oracle:thin:@//oracle-free:1521/SDLC_DEV
            TEST: jdbc:oracle:thin:@//oracle-free:1521/SDLC_TEST
            PROD: jdbc:oracle:thin:@//oracle-free:1521/SDLC_PROD

          App user: sdlc_app (connect via PDB service name)
