# =============================================================================
# MODULE 02: Docker
# =============================================================================
#
# Installs Docker Engine + Docker Compose plugin. Configures log rotation.
# Stack-agnostic — runs on any server after Module 01 (foundation.yml).
#
# Prerequisites:
#   - Module 01 (foundation.yml) must have run
#
# Usage:
#   ansible-playbook -i inventory.local.yml docker.yml
#
# =============================================================================

---
- name: "Module 02: Docker"
  hosts: servers
  become: true
  gather_facts: true

  vars:
    server_user: "{{ deploy_user | default('deploy') }}"

  tasks:

    # =================================================================
    # PHASE 1: Install Docker Engine
    # =================================================================

    - name: "Docker: remove legacy packages"
      tags: [docker]
      ansible.builtin.apt:
        name:
          - docker
          - docker-engine
          - docker.io
          - containerd
          - runc
        state: absent
      failed_when: false

    - name: "Docker: install dependencies"
      tags: [docker]
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: "Docker: create keyring directory"
      tags: [docker]
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: "Docker: fetch GPG key"
      tags: [docker]
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: "Docker: add repository"
      tags: [docker]
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: "Docker: install packages"
      tags: [docker]
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: "Docker: start and enable service"
      tags: [docker]
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: "Docker: add deploy user to docker group"
      tags: [docker]
      ansible.builtin.user:
        name: "{{ server_user }}"
        groups: docker
        append: true

    # =================================================================
    # PHASE 2: Configure log rotation
    # =================================================================

    - name: "Docker: configure log rotation"
      tags: [docker]
      ansible.builtin.copy:
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
        dest: /etc/docker/daemon.json
        mode: "0644"
      notify: Restart Docker

    # =================================================================
    # PHASE 3: Verification
    # =================================================================

    - name: "Verify: Docker info"
      tags: [docker]
      ansible.builtin.command: docker info
      register: docker_info
      changed_when: false

    - name: "Verify: summary"
      ansible.builtin.debug:
        msg: ">>> MODULE 02 COMPLETE: Docker installed and running <<<"

  handlers:
    - name: Restart Docker
      ansible.builtin.systemd:
        name: docker
        state: restarted
