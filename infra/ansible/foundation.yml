# =============================================================================
# MODULE 01: Foundation
# =============================================================================
#
# Hardens a fresh Ubuntu 24.04 server: firewall (UFW), brute-force protection
# (Fail2Ban), SSH hardening, kernel parameters, swap, timezone,
# and automatic security updates.
#
# Prerequisites:
#   - Fresh Ubuntu 24.04 server
#   - SSH access with key (as deploy/admin user OR root on first run)
#   - Python 3 on the server (Ubuntu 24.04 ships it)
#
# Usage:
#   ansible-playbook -i inventory.local.yml foundation.yml
#
# First run (root only):
#   ansible-playbook -i inventory.local.yml foundation.yml \
#     -e "ansible_user=root" -e "first_run=true"
#
# =============================================================================

---
- name: "Module 01: Foundation"
  hosts: servers
  become: true
  gather_facts: true

  vars:
    server_user: "{{ deploy_user | default('deploy') }}"
    server_swap: "{{ swap_size | default('4G') }}"
    server_timezone: "{{ timezone | default('Europe/Berlin') }}"
    first_run: false

    # SSH hardening
    ssh_max_auth_tries: 3
    ssh_login_grace_time: 30
    ssh_client_alive_interval: 300
    ssh_client_alive_count_max: 2

    # Fail2Ban
    f2b_bantime: 3600
    f2b_findtime: 600
    f2b_maxretry: 3

  tasks:

    # =================================================================
    # PHASE 1: Deploy user
    # =================================================================

    - name: "Deploy user: create"
      when: first_run | bool
      tags: [user]
      block:
        - name: Create user (no password login)
          ansible.builtin.user:
            name: "{{ server_user }}"
            shell: /bin/bash
            create_home: true
            password: "!"
            comment: "Deploy User"

        - name: Grant passwordless sudo
          ansible.builtin.copy:
            content: "{{ server_user }} ALL=(ALL) NOPASSWD:ALL\n"
            dest: "/etc/sudoers.d/{{ server_user }}"
            mode: "0440"
            validate: "visudo -cf %s"

        - name: Create .ssh directory
          ansible.builtin.file:
            path: "/home/{{ server_user }}/.ssh"
            state: directory
            owner: "{{ server_user }}"
            group: "{{ server_user }}"
            mode: "0700"

        - name: Copy SSH key from root
          ansible.builtin.copy:
            src: /root/.ssh/authorized_keys
            dest: "/home/{{ server_user }}/.ssh/authorized_keys"
            remote_src: true
            owner: "{{ server_user }}"
            group: "{{ server_user }}"
            mode: "0600"

    # =================================================================
    # PHASE 2: Firewall (UFW)
    # =================================================================

    - name: "Firewall: install UFW"
      tags: [firewall]
      ansible.builtin.apt:
        name: ufw
        state: present

    - name: "Firewall: default deny incoming"
      tags: [firewall]
      community.general.ufw:
        direction: incoming
        default: deny

    - name: "Firewall: default deny forward (Docker protection)"
      tags: [firewall]
      community.general.ufw:
        direction: routed
        default: deny

    - name: "Firewall: default allow outgoing"
      tags: [firewall]
      community.general.ufw:
        direction: outgoing
        default: allow

    - name: "Firewall: allow loopback"
      tags: [firewall]
      community.general.ufw:
        rule: allow
        interface: lo
        direction: in

    - name: "Firewall: open required ports (SSH, HTTP, HTTPS)"
      tags: [firewall]
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: tcp
        comment: "{{ item.comment }}"
      loop:
        - { port: "22", comment: "SSH" }
        - { port: "80", comment: "HTTP" }
        - { port: "443", comment: "HTTPS" }

    - name: "Firewall: enable UFW"
      tags: [firewall]
      community.general.ufw:
        state: enabled

    # =================================================================
    # PHASE 3: SSH hardening
    # =================================================================

    - name: "SSH: drop-in hardening config"
      tags: [ssh]
      ansible.builtin.copy:
        content: |
          # === Access Control ===
          PermitRootLogin no
          AllowUsers {{ server_user }}
          PasswordAuthentication no
          PermitEmptyPasswords no
          HostbasedAuthentication no
          KbdInteractiveAuthentication no
          IgnoreRhosts yes

          # === Brute-force limits ===
          MaxAuthTries {{ ssh_max_auth_tries }}
          LoginGraceTime {{ ssh_login_grace_time }}
          MaxStartups 10:30:60

          # === Session ===
          ClientAliveInterval {{ ssh_client_alive_interval }}
          ClientAliveCountMax {{ ssh_client_alive_count_max }}
          X11Forwarding no
        dest: /etc/ssh/sshd_config.d/99-hardening.conf
        mode: "0644"
      notify: Reload SSH

    - name: "SSH: validate config"
      tags: [ssh]
      ansible.builtin.command: sshd -t
      changed_when: false

    # =================================================================
    # PHASE 4: Brute-force protection (Fail2Ban)
    # =================================================================

    - name: "Fail2Ban: install"
      tags: [fail2ban]
      ansible.builtin.apt:
        name: fail2ban
        state: present

    - name: "Fail2Ban: configure jail.local"
      tags: [fail2ban]
      ansible.builtin.copy:
        content: |
          [DEFAULT]
          bantime = {{ f2b_bantime }}
          findtime = {{ f2b_findtime }}
          maxretry = {{ f2b_maxretry }}
          banaction = ufw

          [sshd]
          enabled = true
          port = ssh
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = {{ f2b_maxretry }}
          bantime = {{ f2b_bantime }}
        dest: /etc/fail2ban/jail.local
        mode: "0644"
      notify: Restart Fail2Ban

    # =================================================================
    # PHASE 5: Kernel hardening
    # =================================================================

    - name: "Kernel: sysctl hardening parameters"
      tags: [kernel]
      ansible.builtin.copy:
        content: |
          # === Network (IPv4) ===
          net.ipv4.conf.all.accept_redirects = 0
          net.ipv4.conf.default.accept_redirects = 0
          net.ipv4.conf.all.send_redirects = 0
          net.ipv4.conf.default.send_redirects = 0
          net.ipv4.conf.all.accept_source_route = 0
          net.ipv4.conf.default.accept_source_route = 0
          net.ipv4.conf.all.log_martians = 1
          net.ipv4.conf.default.log_martians = 1
          net.ipv4.conf.all.rp_filter = 1
          net.ipv4.conf.default.rp_filter = 1
          net.ipv4.tcp_syncookies = 1
          net.ipv4.icmp_echo_ignore_broadcasts = 1
          net.ipv4.icmp_ignore_bogus_error_responses = 1

          # === Network (IPv6) ===
          net.ipv6.conf.all.accept_redirects = 0
          net.ipv6.conf.default.accept_redirects = 0
          net.ipv6.conf.all.accept_source_route = 0
          net.ipv6.conf.default.accept_source_route = 0

          # === Kernel ===
          kernel.randomize_va_space = 2
          kernel.sysrq = 0
          kernel.dmesg_restrict = 1
          kernel.kptr_restrict = 2
          kernel.yama.ptrace_scope = 2
          kernel.unprivileged_bpf_disabled = 1
          kernel.perf_event_paranoid = 3

          # === Filesystem ===
          fs.suid_dumpable = 0
          fs.protected_hardlinks = 1
          fs.protected_symlinks = 1
        dest: /etc/sysctl.d/99-hardening.conf
        mode: "0644"
      notify: Apply Sysctl

    # =================================================================
    # PHASE 6: Swap
    # =================================================================

    - name: "Swap: check if swapfile exists"
      tags: [swap]
      ansible.builtin.stat:
        path: /swapfile
      register: swap_file

    - name: "Swap: create and enable"
      tags: [swap]
      when: not swap_file.stat.exists
      block:
        - name: Allocate swapfile
          ansible.builtin.command:
            cmd: "fallocate -l {{ server_swap }} /swapfile"
          changed_when: true

        - name: Set swapfile permissions
          ansible.builtin.file:
            path: /swapfile
            mode: "0600"

        - name: Format swap
          ansible.builtin.command:
            cmd: mkswap /swapfile
          changed_when: true

        - name: Activate swap
          ansible.builtin.command:
            cmd: swapon /swapfile
          changed_when: true

        - name: Persist swap in fstab
          ansible.builtin.lineinfile:
            path: /etc/fstab
            line: "/swapfile none swap sw 0 0"
            state: present

    # =================================================================
    # PHASE 7: Timezone
    # =================================================================

    - name: "Timezone: set"
      community.general.timezone:
        name: "{{ server_timezone }}"

    # =================================================================
    # PHASE 8: Automatic security updates
    # =================================================================

    - name: "Updates: install system updates"
      ansible.builtin.apt:
        update_cache: true
        upgrade: safe

    - name: "Updates: install unattended-upgrades"
      ansible.builtin.apt:
        name: unattended-upgrades
        state: present

    - name: "Updates: enable unattended-upgrades timer"
      ansible.builtin.systemd:
        name: apt-daily-upgrade.timer
        enabled: true
        state: started

    # =================================================================
    # PHASE 9: Verification
    # =================================================================

    - name: "Verify: UFW status"
      ansible.builtin.command: ufw status verbose
      register: ufw_status
      changed_when: false
      check_mode: false

    - name: "Verify: Fail2Ban status"
      ansible.builtin.command: fail2ban-client status sshd
      register: f2b_status
      changed_when: false
      check_mode: false

    - name: "Verify: kernel parameters"
      ansible.builtin.command: sysctl net.ipv4.conf.all.send_redirects net.ipv4.conf.all.rp_filter kernel.yama.ptrace_scope
      register: sysctl_check
      changed_when: false
      check_mode: false

    - name: "Verify: swap"
      ansible.builtin.command: swapon --show
      register: swap_check
      changed_when: false
      check_mode: false

    - name: "Verify: summary"
      ansible.builtin.debug:
        msg: |
          === MODULE 01 COMPLETE ===

          Firewall:  {{ 'ACTIVE' if 'Status: active' in ufw_status.stdout else 'INACTIVE!' }}
          Fail2Ban:  {{ 'ACTIVE' if 'Currently banned' in f2b_status.stdout else 'INACTIVE!' }}
          Kernel:    send_redirects={{ sysctl_check.stdout_lines[0].split('=')[1] | trim }}, rp_filter={{ sysctl_check.stdout_lines[1].split('=')[1] | trim }}, ptrace={{ sysctl_check.stdout_lines[2].split('=')[1] | trim }}
          Swap:      {{ 'ACTIVE' if swap_check.stdout | length > 0 else 'NOT PRESENT!' }}

          {{ '>>> FOUNDATION COMPLETE <<<' if ('Status: active' in ufw_status.stdout and swap_check.stdout | length > 0) else '>>> WARNING: NOT ALL SYSTEMS ACTIVE <<<' }}

    - name: "Verify: reboot required?"
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: "Verify: reboot notice"
      when: reboot_required.stat.exists
      ansible.builtin.debug:
        msg: "NOTE: Server reboot recommended (kernel updates). Run manually: ssh {{ inventory_hostname }} 'sudo reboot'"

  handlers:
    - name: Reload SSH
      ansible.builtin.systemd:
        name: ssh
        state: reloaded

    - name: Restart Fail2Ban
      ansible.builtin.systemd:
        name: fail2ban
        state: restarted

    - name: Apply Sysctl
      ansible.builtin.command: sysctl -p /etc/sysctl.d/99-hardening.conf
      changed_when: true
